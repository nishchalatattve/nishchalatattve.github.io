[project]

site_name = "Technical Documentation"
site_url = "https://blog.nishchalatattve.com"
site_description = "Various tecnical documentations, including C++, markdown and Python."
site_author = "Haoze Pang"

docs_dir = "docs"   # This is the default option, included here for clarity.
site_dir = "site"   # This is the default option, included here for clarity.
use_directory_urls = true   # This is the default option, included here for clarity.

copyright = """
Unless otherwise stated, the articles on this website are written by Haoze Pang. Copyright &copy; 2026 Haoze Pang.
"""

nav = [
    "index.md",
    {"Languages" = [
        "languages/index.md",
        {"Markdown" = [
            "languages/Markdown/index.md"
        ]},
        {"C++" = [
            "languages/C++/index.md",
            "languages/C++/environments.md",
        ]},
        {"Python" = [
            "languages/Python/index.md"
        ]},
    ]},
    {"Frameworks" = [
        {"Toolbox" = []},   # e. g. a pdf extractor. Everything that is not in other folders.
        {"LLM" = []},
        {"Scientific computing" = []},
        {"Web" = []},
    ]} ,
    {"DevOps " = [
        "DevOps/index.md",
        {"Git" = [
            "DevOps/Git/index.md",
        ]}, # Git
        {"GitLab" = [
            "DevOps/GitLab/index.md"
        ]},
        {"Cloud" = [
            "DevOps/cloud/index.md",
            {"Azure" = [
                "DevOps/cloud/Azure/index.md",
            ]},
            {"GCP" = [
                "DevOps/cloud/GCP/index.md"
            ]},
        ]},
        {"Networking" = [
            "DevOps/networking/index.md",
            {"nginx" = [
                "DevOps/networking/nginx/index.md",
                "DevOps/networking/nginx/TLS configuration.md"
            ]},
            {"Tailscale" = []},
            {"NordVPN" = [
                "DevOps/networking/NordVPN/index.md",
            ]}
        ]},
        {"Linux" = [
            "DevOps/Linux/index.md",
        ]},
        {"SSH" = [
            "DevOps/SSH/index.md",
        ]},
#        "DevOps/Terraform/get_started.md",
    ]},
    {"My thoughts" = []},
    {"Zensical Demo" = [
        "zensical_demo/index.md",
        "zensical_demo/get_started.md",
