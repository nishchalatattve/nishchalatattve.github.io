    ]}
]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

# === Theme ===
[project.theme]
# Zensical allows you to override specific blocks, partials, or whole
# templates as well as to define your own templates. To do this, uncomment
# the custom_dir setting below and set it to a directory in which you
# keep your template overrides.
#
# Read more:
# - https://zensical.org/docs/customization/#extending-the-theme
#
custom_dir = "overrides"
favicon = "images/lightbulb.png"
language = "en" # Read more at https://zensical.org/docs/setup/language/
features = [
    "announce.dismiss",

    "content.action.edit",
    "content.action.view",

    "content.code.annotate",
    "content.code.copy",

    "content.tooltips",
    "content.footnote.tooltips",

    "content.tabs.link",

#    === Navigation ===
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "navigation.indexes",
#    "navigation.prune",
    "navigation.footer",
    "navigation.path",

    "navigation.instant",
    "navigation.instant.prefetch",

    "navigation.top",   # A back-to-top button can be shown when the user, after scrolling down, starts to scroll up again.
    "navigation.tracking",  # Update URL to the current anchor


    "search.highlight",

    "toc.follow",
]


font.text = "Inter"
font.code = "Jetbrains Mono"
# ----------------------------------------------------------------------------
# In the "palette" subsection you can configure options for the color scheme.
# You can configure different color # schemes, e.g., to turn on dark mode,
# that the user can switch between. Each color scheme can be further
# customized.
#
# Read more:
# - https://zensical.org/docs/setup/colors/
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# You can configure your own logo to be shown in the header using the "logo"
# option in the "icons" subsection. The logo can be a path to a file in your
